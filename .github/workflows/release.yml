name: Release build

# Builds the single-file .exe in CI (so it can be code-signed by SignPath, which
# only signs artifacts produced by a trusted pipeline). Runs on version tags or
# manually. The signing step self-activates once SignPath is configured (see
# docs/SIGNING.md); until then the workflow just builds + attaches the unsigned exe.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .exe
        run: powershell -ExecutionPolicy Bypass -File app/build_exe.ps1

      - name: Upload unsigned artifact
        id: artifact
        uses: actions/upload-artifact@v4
        with:
          name: HaylouS30Pro
          path: app/dist/Haylou S30 Pro.exe
          if-no-files-found: error

      # ── Code signing via SignPath Foundation (free for open source). ──
      # Activates automatically once the repo has the SIGNPATH_API_TOKEN secret and
      # the SIGNPATH_ORG_ID / SIGNPATH_PROJECT_SLUG / SIGNPATH_POLICY_SLUG variables.
      - name: Sign with SignPath
        if: env.SIGNPATH_API_TOKEN != ''
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ steps.artifact.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Attach SIGNED exe to the release
        if: startsWith(github.ref, 'refs/tags/v') && env.SIGNPATH_API_TOKEN != ''
        uses: softprops/action-gh-release@v2
        with:
          files: signed/Haylou S30 Pro.exe

      - name: Attach UNSIGNED exe to the release
        if: startsWith(github.ref, 'refs/tags/v') && env.SIGNPATH_API_TOKEN == ''
        uses: softprops/action-gh-release@v2
        with:
          files: app/dist/Haylou S30 Pro.exe
