name: Release build

# Builds the app in CI (--onedir: a folder with the exe + DLLs, no temp _MEI at
# runtime) and attaches a .zip to the GitHub release. Runs on version tags or
# manually.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build app (onedir)
        run: powershell -ExecutionPolicy Bypass -File app/build_exe.ps1

      - name: Make shortcut (correct icon + AppID for pinning)
        run: powershell -ExecutionPolicy Bypass -File app/make_shortcut.ps1

      - name: Zip the app folder
        run: |
          cd "app/dist"
          Compress-Archive -Path "Haylou S30 Pro" -DestinationPath "Haylou-S30-Pro-Windows.zip" -Force
        shell: pwsh

      - name: Compute SHA-256
        run: |
          $h = (Get-FileHash "app/dist/Haylou-S30-Pro-Windows.zip" -Algorithm SHA256).Hash
          "SHA-256: $h" | Out-File -FilePath sha.txt -Encoding ascii
          Write-Host "SHA-256: $h"
        shell: pwsh

      - name: Attach zip to the release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/dist/Haylou-S30-Pro-Windows.zip
            sha.txt
